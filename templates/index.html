<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignAI | Professional Sign Language Interpreter</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg));
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            padding: 2rem;
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            width: 95%;
            max-width: 1200px;
            padding-bottom: 3rem;
        }

        .video-section {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .video-wrapper {
            width: 100%;
            aspect-ratio: 4/3;
            max-width: 800px;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        .video-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 0.5rem 1rem;
            border-radius: 100px;
            font-size: 0.875rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
        }

        .detected-text {
            margin-top: 1.5rem;
            width: 100%;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            font-size: 1.5rem;
            min-height: 80px;
            display: flex;
            align-items: center;
            border: 1px solid var(--glass-border);
        }

        .controls-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            animation: fadeInRight 0.8s ease-out;
        }

        .panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
        }

        .panel-title {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #94a3b8;
            margin-bottom: 1rem;
        }

        .grid-controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        button {
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 12px;
            background: var(--glass);
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover {
            background: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        button.primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .suggestions-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .suggestion-btn {
            text-align: left;
            justify-content: flex-start;
            font-weight: 400;
            font-style: italic;
        }

        .pulse-red {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 0 rgba(239, 68, 68, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 1024px) {
            .main-container { grid-template-columns: 1fr; }
            .controls-section { grid-template-columns: repeat(2, 1fr); }
            .tts-input-area { flex-direction: column; }
        }

        .text-to-sign-container {
            width: 95%;
            max-width: 1200px;
            margin-bottom: 3rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            animation: fadeInDown 0.8s ease-out;
        }
        
        .tts-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .tts-input-area {
            width: 100%;
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .tts-textarea {
            flex: 1;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            resize: none;
            height: 60px;
        }
        
        .tts-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .canvas-wrapper {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 16px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--glass-border);
            overflow: hidden;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1e1b4b, #000);
        }

        .current-letter-overlay {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 4rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        @media (max-width: 640px) {
            .controls-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>SignAI Interpreter</h1>
    </header>

    <main class="main-container">
        <section class="video-section">
            <div class="video-wrapper">
                <div class="status-badge">
                    <span class="pulse-red"></span> LIVE: <span id="label">?</span> (<span id="confidence">0.00</span>)
                </div>
            <img src="{{ url_for('video_feed') }}" alt="Webcam Feed">
            </div>
            <div class="detected-text" id="sentence">
                <span style="color: #64748b">Raw Signs: </span><span id="raw-signs">...</span>
            </div>
            <div class="detected-text" id="ai-result" style="margin-top: 10px; border-color: var(--primary); background: rgba(99, 102, 241, 0.1);">
                <span style="color: #6366f1; font-weight: 600;">Meaningful Sentence: </span><span id="meaningful-text" style="color: #fff; margin-left: 10px;">Waiting for AI...</span>
            </div>
        </section>

        <aside class="controls-section">
            <div class="panel">
                <div class="panel-title">Actions</div>
                <div class="grid-controls">
                    <button class="primary" onclick="handleAction('ADD')">Append</button>
                    <button onclick="handleAction('SPACE')">Space</button>
                    <button onclick="handleAction('DELETE')">Delete</button>
                    <button onclick="handleAction('CLEAR')">Clear</button>
                    <button style="grid-column: span 2; background: linear-gradient(135deg, #4f46e5, #7c3aed);" id="ai-btn" onclick="refineWithAI()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path><path d="M12 2a10 10 0 0 1 10 10h-10V2z"></path><path d="M12 12L2.69 21"></path><path d="M12 12l9.31 9"></path></svg>
                        Refine with AI
                    </button>
                    <button style="grid-column: span 2" onclick="speak()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                        Speak Sentence
                    </button>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">Suggestions</div>
                <div class="suggestions-list" id="suggestions">
                    <!-- Suggestions will appear here -->
                </div>
            </div>
        </aside>
    </main>

    <div class="text-to-sign-container">
        <section class="tts-panel">
            <h2 style="margin-bottom: 1.5rem; font-weight: 400; color: #e2e8f0; letter-spacing: 0.05em;">Text → Sign Language Animation</h2>
            <div class="tts-input-area">
                <textarea id="tts-input" class="tts-textarea" placeholder="Type a sentence to translate to sign language..."></textarea>
                <button class="primary" id="tts-btn" onclick="translateTextToSign()" style="padding: 0 2rem; font-size: 1.1rem;">
                    Convert to Sign ✨
                </button>
            </div>
            
            <div class="detected-text" id="tts-refined-display" style="width: 100%; margin-top: 0; margin-bottom: 2rem; border-color: var(--secondary); background: rgba(168, 85, 247, 0.1); display: none;">
                <span style="color: #a855f7; font-weight: 600;">Keywords: </span>
                <span id="tts-keywords" style="color: #fff; margin-left: 10px;"></span>
            </div>
            
            <div class="canvas-wrapper">
                <canvas id="sign-canvas" width="600" height="450"></canvas>
                <div class="current-letter-overlay" id="current-letter"></div>
                <div id="canvas-placeholder" style="position: absolute; color: #64748b; font-size: 1.2rem; font-weight: 300;">Animation will appear here</div>
            </div>
        </section>
    </div>

    <script>
        // Hand gesture definitions
        const HAND_CONNECTIONS = [
            [0, 1], [1, 2], [2, 3], [3, 4],           // Thumb
            [0, 5], [5, 6], [6, 7], [7, 8],           // Index
            [9, 10], [10, 11], [11, 12],              // Middle
            [13, 14], [14, 15], [15, 16],             // Ring
            [17, 18], [18, 19], [19, 20],             // Pinky
            [0, 5], [5, 9], [9, 13], [13, 17], [17, 0] // Palm
        ];

        let playInterval = null;

        async function translateTextToSign() {
            const text = document.getElementById('tts-input').value;
            if (!text.trim()) return;
            
            const btn = document.getElementById('tts-btn');
            btn.innerHTML = 'Converting...';
            btn.disabled = true;
            
            if (playInterval) clearInterval(playInterval);
            
            try {
                const res = await fetch('/text_to_sign', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();
                
                document.getElementById('tts-refined-display').style.display = 'flex';
                document.getElementById('tts-keywords').innerText = data.refined_text || "No keywords extracted";
                
                document.getElementById('canvas-placeholder').style.display = 'none';
                
                playSignAnimation(data.letters);
                
            } catch (e) {
                console.error(e);
                alert("Failed to convert text to sign.");
            } finally {
                btn.innerHTML = 'Convert to Sign ✨';
                btn.disabled = false;
            }
        }
        
        async function fetchLandmarks(char) {
            try {
                const res = await fetch(`/get_landmark/${encodeURIComponent(char)}`);
                if (res.ok) {
                    const data = await res.json();
                    return data.landmarks;
                }
            } catch (e) {
                console.error(e);
            }
            return null;
        }

        async function playSignAnimation(letters) {
            const canvas = document.getElementById('sign-canvas');
            const ctx = canvas.getContext('2d');
            const overlay = document.getElementById('current-letter');
            
            // fetch all landmarks beforehand to guarantee smooth animation
            const timeline = [];
            for (let char of letters) {
                const lm = await fetchLandmarks(char);
                timeline.push({ char, lm });
            }
            
            let idx = 0;
            
            const drawFrame = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (idx >= timeline.length) {
                    clearInterval(playInterval);
                    overlay.innerText = "Done ✓";
                    return;
                }
                
                const { char, lm } = timeline[idx];
                overlay.innerText = char === " " ? "SPACE" : char;
                
                if (lm) {
                    drawSkeleton(ctx, lm, canvas.width, canvas.height);
                }
                
                idx++;
            };
            
            // Play first frame immediately
            drawFrame();
            // Then schedule interval
            playInterval = setInterval(drawFrame, 1200);
        }
        
        function drawSkeleton(ctx, landmarks, w, h) {
            // landmarks are [x,y] normalized around wrist (0,0)
            const scale = Math.min(w, h) * 0.45;
            const cx = w / 2;
            const cy = h * 0.8; // wrist position (bottom center)
            
            const pxPts = landmarks.map(pt => [
                cx + pt[0] * scale,
                cy + pt[1] * scale
            ]);
            
            // Draw bones
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#e2e8f0'; // Light silver
            ctx.lineCap = 'round';
            for (let conn of HAND_CONNECTIONS) {
                const start = pxPts[conn[0]];
                const end = pxPts[conn[1]];
                
                ctx.beginPath();
                ctx.moveTo(start[0], start[1]);
                ctx.lineTo(end[0], end[1]);
                ctx.stroke();
            }
            
            // Draw glowing joints
            const colors = [
                '#ef4444', // wrist (red)
                '#fbbf24', '#fbbf24', '#fbbf24', '#fbbf24', // thumb (yellow)
                '#3b82f6', '#3b82f6', '#3b82f6', '#3b82f6', // index (blue)
                '#10b981', '#10b981', '#10b981', '#10b981', // middle (green)
                '#8b5cf6', '#8b5cf6', '#8b5cf6', '#8b5cf6', // ring (purple)
                '#ec4899', '#ec4899', '#ec4899', '#ec4899'  // pinky (pink)
            ];
            
            for (let i = 0; i < pxPts.length; i++) {
                ctx.beginPath();
                ctx.arc(pxPts[i][0], pxPts[i][1], 7, 0, 2*Math.PI);
                ctx.fillStyle = colors[i] || '#fff';
                ctx.shadowColor = colors[i] || '#fff';
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0; // reset
            }
        }

        function handleAction(name) {
            fetch(`/action/${name}`)
                .then(r => r.json())
                .then(data => updateDisplay(data.sentence));
        }

        function applySuggestion(word) {
            fetch(`/apply_suggestion/${word}`)
                .then(r => r.json())
                .then(data => updateDisplay(data.sentence));
        }

        function speak() {
            fetch('/speak');
        }

        function refineWithAI() {
            const btn = document.getElementById('ai-btn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = 'Refining...';
            btn.disabled = true;

            fetch('/refine_sentence')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('meaningful-text').innerText = data.ai_sentence;
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                })
                .catch(err => {
                    console.error("AI refinement failed:", err);
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                });
        }

        function updateDisplay(sentence, ai_sentence) {
            const raw = document.getElementById('raw-signs');
            const meaningful = document.getElementById('meaningful-text');
            
            raw.innerText = sentence || "...";
            if (ai_sentence) {
                meaningful.innerText = ai_sentence;
            }
        }

        // Real-time state updates
        setInterval(() => {
            fetch('/get_state')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('label').innerText = data.label;
                    document.getElementById('confidence').innerText = data.confidence;
                    updateDisplay(data.sentence, data.ai_sentence);
                    
                    const suggDiv = document.getElementById('suggestions');
                    suggDiv.innerHTML = "";
                    
                    if (!data.suggestions || data.suggestions.length === 0) {
                        suggDiv.innerHTML = '<div style="color: #64748b; font-size: 0.875rem">No suggestions</div>';
                    } else {
                        data.suggestions.forEach(word => {
                            const btn = document.createElement('button');
                            btn.className = "suggestion-btn";
                            btn.innerText = word;
                            btn.onclick = () => applySuggestion(word);
                            suggDiv.appendChild(btn);
                        });
                    }
                })
                .catch(err => console.error("Update failed:", err));
        }, 800);
    </script>
</body>
</html>
